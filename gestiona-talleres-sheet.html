<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestión de Talleres</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root,[data-theme="light"]{
  --bg:#f7f6f2;--surf:#f9f8f5;--off:#f0ede8;--div:#dcd9d5;--brd:#d4d1ca;
  --tx:#28251d;--txm:#7a7974;--txf:#bab9b4;
  --pri:#01696f;--prih:#0c4e54;--ok:#437a22;--warn:#964219;
  --sm:0 1px 2px oklch(0.2 0.01 80/.06);--md:0 4px 12px oklch(0.2 0.01 80/.10);--lg:0 12px 32px oklch(0.2 0.01 80/.14);
  --rsm:.375rem;--rmd:.5rem;--rlg:.75rem;--rxl:1rem;--rfull:9999px;
  --xs:clamp(.75rem,.7rem + .25vw,.875rem);--sm2:clamp(.875rem,.8rem + .35vw,1rem);
  --tr:180ms cubic-bezier(0.16,1,0.3,1);--sw:320px;
}
[data-theme="dark"]{
  --bg:#171614;--surf:#1c1b19;--off:#252422;--div:#262523;--brd:#393836;
  --tx:#cdccca;--txm:#797876;--txf:#5a5957;
  --pri:#4f98a3;--prih:#227f8b;--ok:#6daa45;--warn:#bb653b;
  --sm:0 1px 2px oklch(0 0 0/.2);--md:0 4px 12px oklch(0 0 0/.3);--lg:0 12px 32px oklch(0 0 0/.4);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{-webkit-font-smoothing:antialiased;}
body{height:100vh;font-family:"Inter","Helvetica Neue",sans-serif;font-size:var(--sm2);color:var(--tx);background:var(--bg);display:flex;flex-direction:column;overflow:hidden;}
button{cursor:pointer;background:none;border:none;font:inherit;color:inherit;transition:color var(--tr),background var(--tr),border-color var(--tr);}
input{font:inherit;color:var(--tx);}
.topbar{display:flex;align-items:center;gap:.625rem;padding:.5rem 1rem;background:var(--surf);border-bottom:1px solid var(--div);box-shadow:var(--sm);z-index:100;flex-shrink:0;flex-wrap:wrap;row-gap:.375rem;}
.logo{display:flex;align-items:center;gap:.4rem;font-size:var(--sm2);font-weight:700;white-space:nowrap;}
.logo svg{color:var(--pri);}
.chips{display:flex;gap:.3rem;flex-shrink:0;}
.chip{display:inline-flex;align-items:center;gap:.3rem;padding:.15rem .55rem;border-radius:var(--rfull);font-size:11px;font-weight:700;}
.cb{background:color-mix(in oklch,var(--pri) 14%,var(--surf));color:var(--pri);}
.cg{background:color-mix(in oklch,var(--ok) 14%,var(--surf));color:var(--ok);}
.co{background:color-mix(in oklch,var(--warn) 14%,var(--surf));color:var(--warn);}
.d5{width:5px;height:5px;border-radius:50%;background:currentColor;}
.ml{margin-left:auto;}
.acts{display:flex;align-items:center;gap:.3rem;flex-shrink:0;}
.btn{display:inline-flex;align-items:center;gap:.3rem;padding:.3rem .65rem;border-radius:var(--rmd);font-size:var(--xs);font-weight:600;border:1px solid var(--brd);background:transparent;color:var(--txm);transition:all var(--tr);white-space:nowrap;}
.btn:hover{background:var(--off);color:var(--tx);}
.bic{width:28px;height:28px;padding:0;justify-content:center;}
.vtoggle{display:flex;background:var(--off);border-radius:var(--rmd);padding:2px;gap:2px;border:1px solid var(--brd);}
.vtbtn{padding:.2rem .55rem;border-radius:calc(var(--rmd) - 2px);font-size:11px;font-weight:600;color:var(--txm);border:none;background:transparent;transition:all var(--tr);}
.vtbtn.on{background:var(--surf);color:var(--tx);box-shadow:var(--sm);}
.app{display:flex;flex:1;overflow:hidden;}
.sidebar{width:var(--sw);min-width:var(--sw);display:flex;flex-direction:column;background:var(--surf);border-right:1px solid var(--div);overflow:hidden;transition:min-width var(--tr),width var(--tr);}
.sidebar.hidden{width:0;min-width:0;}
.sbh{padding:.75rem .875rem .5rem;border-bottom:1px solid var(--div);flex-shrink:0;}
.sblbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--txm);margin-bottom:.5rem;}
.sw2{position:relative;}
.sw2 input{width:100%;padding:.4rem .7rem .4rem 1.8rem;background:var(--off);border:1px solid var(--brd);border-radius:var(--rmd);font-size:var(--xs);outline:none;}
.sw2 input::placeholder{color:var(--txf);}
.sw2 input:focus{border-color:var(--pri);box-shadow:0 0 0 2px color-mix(in oklch,var(--pri) 18%,transparent);}
.sic{position:absolute;left:.45rem;top:50%;transform:translateY(-50%);color:var(--txf);pointer-events:none;}
.fa{padding:.5rem .875rem;border-bottom:1px solid var(--div);flex-shrink:0;display:flex;flex-direction:column;gap:.45rem;}
.flbl{font-size:11px;font-weight:600;color:var(--txm);margin-bottom:.15rem;}
.frow{display:flex;gap:.25rem;flex-wrap:wrap;}
.ftag{padding:.175rem .5rem;border-radius:var(--rfull);font-size:11px;font-weight:500;border:1px solid var(--brd);background:transparent;color:var(--txm);cursor:pointer;transition:all var(--tr);}
.ftag.on-all{background:var(--pri);border-color:var(--pri);color:#fff;}
.ftag.on-col{color:#fff;}
.rc{padding:.3rem .875rem;font-size:11px;color:var(--txf);border-bottom:1px solid var(--div);flex-shrink:0;}
.tlist{flex:1;overflow-y:auto;padding:.3rem;}
.tlist::-webkit-scrollbar{width:3px;}
.tlist::-webkit-scrollbar-thumb{background:var(--brd);border-radius:var(--rfull);}
.ti{display:flex;align-items:center;gap:.45rem;padding:.45rem .575rem;border-radius:var(--rmd);cursor:pointer;transition:background var(--tr);}
.ti:hover{background:var(--off);}
.ti.sel{background:color-mix(in oklch,var(--pri) 10%,var(--surf));}
.tiz{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.tii{flex:1;min-width:0;}
.tin{font-size:var(--xs);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tis{font-size:10px;color:var(--txm);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.bdg{padding:.1rem .4rem;border-radius:var(--rfull);font-size:10px;font-weight:700;flex-shrink:0;}
.ba{background:color-mix(in oklch,var(--ok) 16%,var(--surf));color:var(--ok);}
.bv{background:color-mix(in oklch,var(--warn) 16%,var(--surf));color:var(--warn);}
.sbf{padding:.5rem .875rem;border-top:1px solid var(--div);flex-shrink:0;}
.empty{display:flex;flex-direction:column;align-items:center;padding:2rem 1rem;gap:.5rem;color:var(--txf);text-align:center;font-size:var(--xs);}
.mw{flex:1;position:relative;overflow:hidden;}
#map{width:100%;height:100%;}
.mleg{position:absolute;bottom:1.25rem;left:.875rem;background:var(--surf);border:1px solid var(--brd);border-radius:var(--rlg);padding:.625rem .875rem;z-index:400;box-shadow:var(--md);min-width:148px;max-height:70vh;overflow-y:auto;}
.mleg::-webkit-scrollbar{width:3px;}
.mleg::-webkit-scrollbar-thumb{background:var(--brd);}
.lt{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--txm);margin-bottom:.35rem;}
.li{display:flex;align-items:center;gap:.35rem;font-size:11px;color:var(--txm);margin-bottom:.2rem;}
.li:last-child{margin-bottom:0;}
.ld{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.ls{border:none;border-top:1px solid var(--div);margin:.4rem 0;}
.panel{position:absolute;bottom:1rem;right:1rem;width:285px;background:var(--surf);border:1px solid var(--brd);border-radius:var(--rxl);box-shadow:var(--lg);padding:1rem;z-index:500;transform:translateY(calc(100% + 2rem));opacity:0;transition:transform .3s cubic-bezier(0.16,1,0.3,1),opacity .25s ease;pointer-events:none;}
.panel.open{transform:translateY(0);opacity:1;pointer-events:all;}
.ph{display:flex;align-items:flex-start;justify-content:space-between;gap:.5rem;margin-bottom:.5rem;}
.pn{font-size:var(--sm2);font-weight:700;line-height:1.2;}
.pcl{width:20px;height:20px;display:flex;align-items:center;justify-content:center;border-radius:var(--rsm);color:var(--txf);flex-shrink:0;}
.pcl:hover{background:var(--off);color:var(--tx);}
.ctag{display:inline-flex;align-items:center;gap:.3rem;padding:.175rem .55rem;border-radius:var(--rfull);font-size:11px;font-weight:700;margin-bottom:.45rem;}
.pr{display:flex;gap:.35rem;align-items:flex-start;margin-bottom:.3rem;font-size:var(--xs);color:var(--txm);}
.pr svg{flex-shrink:0;margin-top:1px;opacity:.55;}
.pr span{color:var(--tx);}
.pr a{color:var(--pri);text-decoration:none;}
.pr a:hover{text-decoration:underline;}
.pdiv{border:none;border-top:1px solid var(--div);margin:.55rem 0;}
.psl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--txm);margin-bottom:.4rem;}
.tr2{display:flex;gap:.4rem;}
.tb{flex:1;padding:.4rem;border-radius:var(--rmd);font-size:var(--xs);font-weight:600;border:1.5px solid var(--brd);background:var(--off);color:var(--txm);transition:all var(--tr);}
.tb:hover{border-color:var(--pri);}
.tb.ta{background:var(--ok);border-color:var(--ok);color:#fff;}
.tb.tv{background:var(--warn);border-color:var(--warn);color:#fff;}
.toast{position:fixed;bottom:1.25rem;left:50%;transform:translateX(-50%) translateY(4rem);background:var(--tx);color:var(--bg);padding:.4rem 1rem;border-radius:var(--rfull);font-size:var(--xs);font-weight:600;z-index:9999;opacity:0;transition:transform .3s cubic-bezier(0.16,1,0.3,1),opacity .25s ease;pointer-events:none;white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
</style>
</head>
<body>
<header class="topbar">
  <div class="logo">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    <span>Gestión de Talleres</span>
  </div>
  <div class="chips">
    <span class="chip cb"><span class="d5"></span><span id="ct">0</span>&nbsp;total</span>
    <span class="chip cg"><span class="d5"></span><span id="ca">0</span>&nbsp;activos</span>
    <span class="chip co"><span class="d5"></span><span id="cv">0</span>&nbsp;vacac.</span>
  </div>
  <div class="vtoggle">
    <button class="vtbtn on" data-view="comercial" onclick="setView('comercial')">Por comercial</button>
    <button class="vtbtn" data-view="provincia" onclick="setView('provincia')">Por provincia</button>
  </div>
  <div class="ml acts">
    <button class="btn" onclick="exportCSV()">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>CSV
    </button>
    <button class="btn bic" data-theme-toggle title="Tema">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
    </button>
    <button class="btn bic" id="sbt" title="Ocultar panel">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
    </button>
  </div>
</header>
<div class="app">
  <aside class="sidebar" id="sb">
    <div class="sbh">
      <div class="sblbl">Establecimientos</div>
      <div class="sw2">
        <svg class="sic" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" id="srch" placeholder="Buscar taller, ciudad, provincia…">
      </div>
    </div>
    <div class="fa">
      <div>
        <div class="flbl">Estado</div>
        <div class="frow">
          <button class="ftag on-all" data-f="e" data-v="all">Todos</button>
          <button class="ftag" data-f="e" data-v="Activo">✓ Activos</button>
          <button class="ftag" data-f="e" data-v="Vacaciones">☀ Vacaciones</button>
        </div>
      </div>
      <div>
        <div class="flbl">Incidencias</div>
        <div class="frow">
          <button class="ftag on-all" data-f="inc" data-v="all" onclick="setFInc('all')">Todas</button>
          <button class="ftag" data-f="inc" data-v="con-inc" onclick="setFInc('con-inc')">⚠ Con incidencia</button>
          <button class="ftag" data-f="inc" data-v="INCIDENCIA CIA" onclick="setFInc('INCIDENCIA CIA')" >🔴 CIA</button>
          <button class="ftag" data-f="inc" data-v="PROBLEMA WEB" onclick="setFInc('PROBLEMA WEB')">🟣 Web</button>
          <button class="ftag" data-f="inc" data-v="PROBLEMA CORREO" onclick="setFInc('PROBLEMA CORREO')">🟠 Correo</button>
        </div>
      </div>
      <div>
        <div class="flbl" id="fglbl">Comercial</div>
        <div class="frow" id="fgrow"></div>
      </div>
    </div>
    <div class="rc" id="rc"></div>
    <div class="tlist" id="tlist"></div>
    <div class="sbf">
      <button class="btn" style="width:100%;justify-content:center;" onclick="exportCSV()">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>Exportar vista a CSV
      </button>
    </div>
  </aside>
  <div class="mw">
    <div id="map"></div>
    <div class="mleg" id="mleg"></div>
    <div class="panel" id="panel">
      <div class="ph">
        <div class="pn" id="pn"></div>
        <button class="pcl" onclick="closePanel()">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="ctag" id="ctag"></div>
      <div class="pr"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg><span id="pa"></span></div>
      <div class="pr"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.81a19.79 19.79 0 01-3.07-8.68A2 2 0 012 .83h3a2 2 0 012 1.72 12.84 12.84 0 00.7 2.81 2 2 0 01-.45 2.11L6.09 8.72a16 16 0 006.19 6.19l1.45-1.45a2 2 0 012.11-.45 12.84 12.84 0 002.81.7A2 2 0 0122 16.92z"/></svg><span id="pt"></span></div>
      <div class="pr"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg><a id="pm" href="#" target="_blank" rel="noopener"></a></div>
      <div class="pr"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg><span id="phor"></span></div>
      <div class="ctag" id="pinc" style="display:none;margin-bottom:.4rem;padding:.2rem .6rem;border-radius:var(--rfull);font-size:11px;font-weight:700;align-items:center;gap:.3rem;"></div>
      <div id="pnotaswrap" style="display:none;margin-bottom:.4rem;">
        <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--txm);margin-bottom:.2rem;">Notas</div>
        <div id="pnotas" style="font-size:var(--xs);color:var(--tx);background:var(--off);border-radius:var(--rmd);padding:.4rem .5rem;line-height:1.4;"></div>
      </div>
      <hr class="pdiv">
      <div class="psl">Cambiar estado</div>
      <div class="tr2">
        <button class="tb" id="ba" onclick="setSt('Activo')">✓ Activo</button>
        <button class="tb" id="bv" onclick="setSt('Vacaciones')">☀ Vacaciones</button>
      </div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

let talleres=RAW.map(t=>Object.assign({},t)),mkrs={},selId=null,fE="all",fSub="all",fQ="",fInc="all",vm="comercial";

function pc(t){return vm==="comercial"?(COM_MAP[t.comercial]||"#888"):(PROV_MAP[t.provincia]||"#888");}

function mkIcon(t){
  const c=pc(t),v=t.estado==="Vacaciones";
  const inn=v?'<circle cx="12" cy="11" r="5" fill="rgba(255,255,255,.93)"/><text x="12" y="14.5" font-size="5.5" text-anchor="middle" font-family="Arial" font-weight="bold" fill="'+c+'">VAC</text>':'<circle cx="12" cy="11" r="3.5" fill="rgba(255,255,255,.3)"/>';
  const incColor=t.etiqueta&&INC_MAP[t.etiqueta]?INC_MAP[t.etiqueta]:null;
  const incDot=incColor?'<circle cx="19" cy="4" r="5" fill="'+incColor+'" stroke="white" stroke-width="1.5"/>':'';
  return L.divIcon({html:'<svg width="24" height="30" viewBox="0 0 24 30" xmlns="http://www.w3.org/2000/svg"><path d="M12 0C5.37 0 0 5.37 0 12c0 8.5 12 18 12 18S24 20.5 24 12C24 5.37 18.63 0 12 0z" fill="'+c+'" stroke="rgba(255,255,255,.4)" stroke-width="1"/>'+inn+incDot+'</svg>',className:"",iconSize:[24,30],iconAnchor:[12,30]});
}

function init(){talleres.forEach(t=>{const m=L.marker([t.lat,t.lon],{icon:mkIcon(t)}).addTo(map).on("click",()=>openP(t.id));mkrs[t.id]=m;});}

function getF(){
  return talleres.filter(t=>{
    const me=fE==="all"||t.estado===fE;
    const ms=fSub==="all"||(vm==="comercial"?t.comercial===fSub:t.provincia===fSub);
    const q=fQ.toLowerCase();
    const mq=!q||t.nombre.toLowerCase().includes(q)||t.direccion.toLowerCase().includes(q)||t.comercial.toLowerCase().includes(q)||(t.provincia||"").toLowerCase().includes(q);
    const mi=fInc==="all"||(fInc==="con-inc"&&t.etiqueta&&INC_MAP[t.etiqueta])||(t.etiqueta===fInc);
    return me&&ms&&mq&&mi;
  });
}

function setFInc(v){
  fInc=v;
  document.querySelectorAll("[data-f='inc']").forEach(b=>b.classList.toggle("on-all",b.dataset.v===v));
  render();
}

function renderLeg(){
  const leg=document.getElementById("mleg");
  let h='<div class="lt">Estado</div><div class="li"><div class="ld" style="background:var(--ok)"></div>Activo</div><div class="li"><div class="ld" style="background:var(--warn)"></div>Vacaciones</div><hr class="ls"><div class="lt">'+(vm==="comercial"?"Comercial":"Provincia")+'</div>';
  if(vm==="comercial"){COMERCIALES.forEach((c,i)=>{h+='<div class="li"><div class="ld" style="background:'+COM_COLORS[i]+'"></div>'+c+'</div>';});}
  else{const vis=[...new Set(getF().map(t=>t.provincia))].sort();vis.slice(0,18).forEach(p=>{h+='<div class="li"><div class="ld" style="background:'+(PROV_MAP[p]||"#999")+'"></div>'+p+'</div>';});if(vis.length>18)h+='<div class="li" style="font-style:italic;color:var(--txf)">+'+(vis.length-18)+' más…</div>';}
  leg.innerHTML=h;
}

function renderFG(){
  const lbl=document.getElementById("fglbl"),row=document.getElementById("fgrow");
  fSub="all";
  if(vm==="comercial"){
    lbl.textContent="Comercial";
    row.innerHTML='<button class="ftag on-all" data-f="sub" data-v="all">Todos</button>'+COMERCIALES.map((c,i)=>'<button class="ftag" data-f="sub" data-v="'+c+'" data-color="'+COM_COLORS[i]+'">'+c+'</button>').join("");
  } else {
    lbl.textContent="Provincia";
    row.innerHTML='<button class="ftag on-all" data-f="sub" data-v="all">Todas</button>'+PROVINCIAS.map(p=>'<button class="ftag" data-f="sub" data-v="'+p+'" data-color="'+(PROV_MAP[p]||"#999")+'">'+p.replace(/ \(.*\)/,"")+'</button>').join("");
  }
  row.querySelectorAll(".ftag[data-f='sub']").forEach(b=>b.addEventListener("click",()=>{
    row.querySelectorAll(".ftag[data-f='sub']").forEach(x=>{x.classList.remove("on-all","on-col");x.style.cssText="";});
    if(b.dataset.v==="all"){b.classList.add("on-all");}
    else{b.classList.add("on-col");const c=b.dataset.color||"var(--pri)";b.style.background=c;b.style.borderColor=c;b.style.color="#fff";}
    fSub=b.dataset.v;render();
  }));
}

function setView(v){
  vm=v;document.querySelectorAll(".vtbtn").forEach(b=>b.classList.toggle("on",b.dataset.view===v));
  talleres.forEach(t=>{if(mkrs[t.id])mkrs[t.id].setIcon(mkIcon(t));});
  renderLeg();renderFG();render();if(selId)openP(selId);
}

function render(){
  const fil=getF(),ids=new Set(fil.map(t=>t.id));
  document.getElementById("ct").textContent=talleres.length;
  document.getElementById("ca").textContent=talleres.filter(x=>x.estado==="Activo").length;
  document.getElementById("cv").textContent=talleres.filter(x=>x.estado==="Vacaciones").length;
  document.getElementById("rc").textContent=fil.length===talleres.length?fil.length+" talleres":fil.length+" de "+talleres.length;
  talleres.forEach(t=>{if(!mkrs[t.id])return;ids.has(t.id)?(!map.hasLayer(mkrs[t.id])&&mkrs[t.id].addTo(map)):(map.hasLayer(mkrs[t.id])&&map.removeLayer(mkrs[t.id]));});
  renderLeg();
  const list=document.getElementById("tlist");
  if(!fil.length){list.innerHTML='<div class="empty"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>Sin resultados</div>';return;}
  list.innerHTML=fil.map(t=>{
    const dc=pc(t),bc=t.estado==="Activo"?"ba":"bv",bt=t.estado==="Activo"?"Activo":"Vacac.",sel=selId===t.id?" sel":"";
    return '<div class="ti'+sel+'" data-id="'+t.id+'" onclick="selT('+t.id+')">'+'<div class="tiz" style="background:'+dc+'"></div>'+'<div class="tii"><div class="tin">'+t.nombre+'</div><div class="tis">'+t.comercial+' · '+t.provincia+'</div></div>'+'<span class="bdg '+bc+'">'+bt+'</span></div>';
  }).join("");
}

function selT(id){selId=id;const t=talleres.find(x=>x.id===id);if(!t)return;document.querySelectorAll(".ti").forEach(el=>el.classList.toggle("sel",parseInt(el.dataset.id)===id));map.flyTo([t.lat,t.lon],14,{duration:.8});openP(id);}

function openP(id){
  selId=id;const t=talleres.find(x=>x.id===id);if(!t)return;
  document.getElementById("pn").textContent=t.nombre;
  document.getElementById("pa").textContent=t.direccion;

  document.getElementById("phor").textContent=t.horario;

  const incEl=document.getElementById("pinc");
  if(t.etiqueta&&INC_MAP[t.etiqueta]){
    incEl.style.display="flex";incEl.style.background=INC_MAP[t.etiqueta]+"22";incEl.style.color=INC_MAP[t.etiqueta];

  } else { notasWrap.style.display="none"; }

}

function closePanel(){document.getElementById("panel").classList.remove("open");selId=null;document.querySelectorAll(".ti").forEach(el=>el.classList.remove("sel"));}

function setSt(st){
  if(!selId)return;const t=talleres.find(x=>x.id===selId);if(!t||t.estado===st)return;
  t.estado=st;
  if(mkrs[t.id])mkrs[t.id].setIcon(mkIcon(t));
  document.getElementById("ba").className="tb"+(st==="Activo"?" ta":"");
  document.getElementById("bv").className="tb"+(st==="Vacaciones"?" tv":"");
  const it=document.querySelector('.ti[data-id="'+t.id+'"] .bdg');
  if(it){it.className="bdg "+(st==="Activo"?"ba":"bv");it.textContent=st==="Activo"?"Activo":"Vacac.";}
  document.getElementById("ca").textContent=talleres.filter(x=>x.estado==="Activo").length;
  document.getElementById("cv").textContent=talleres.filter(x=>x.estado==="Vacaciones").length;
  toast(t.nombre+" → "+st);

function toast(msg){const el=document.getElementById("toast");el.textContent=msg;el.classList.add("show");setTimeout(()=>el.classList.remove("show"),2500);}

function exportCSV(){
  const fil=getF();
  const hdr=["Código","Nombre","Dirección","Comercial","Provincia","Estado","Teléfono","Correo","Horario"];
  const rows=fil.map(t=>['"'+t.codigo+'"','"'+t.nombre.replace(/"/g,'""')+'"','"'+t.direccion.replace(/"/g,'""')+'"',t.comercial,'"'+t.provincia+'"',t.estado,t.telefono,t.correo,'"'+t.horario.replace(/"/g,'""')+'"'].join(","));
  const csv="\uFEFF"+[hdr.join(","),...rows].join("\n");
  const blob=new Blob([csv],{type:"text/csv;charset=utf-8;"});
  const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download="talleres.csv";a.click();URL.revokeObjectURL(url);
  toast("CSV exportado ("+fil.length+" registros)");
}

document.querySelectorAll(".ftag[data-f='e']").forEach(b=>b.addEventListener("click",()=>{
  document.querySelectorAll(".ftag[data-f='e']").forEach(x=>{x.classList.remove("on-all","on-col");x.style.cssText="";});
  if(b.dataset.v==="all"){b.classList.add("on-all");}
  else if(b.dataset.v==="Activo"){b.classList.add("on-col");b.style.background="var(--ok)";b.style.borderColor="var(--ok)";b.style.color="#fff";}
  else{b.classList.add("on-col");b.style.background="var(--warn)";b.style.borderColor="var(--warn)";b.style.color="#fff";}
  fE=b.dataset.v;render();
}));

(async () => {
  try {
    const res = await fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vTqiJxA1fpdqjUJm_Ou2XNGTgPV72HRbuOiFQe98fJO-twrm8dDxqhLSkqwd91ZFF2Y9zEKsOTQjJ5A/pub?gid=1507214264&single=true&output=csv");
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const text = await res.text();
    console.log('CSV Google Sheets cargado');
    const lines = text.trim().split('\n');
    const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g,''));
    const parsed = lines.slice(1).map(line => {
      const cols = [];
      let cur = '', inQ = false;
      for (const ch of line) {
        if (ch === '"') inQ = !inQ;
        else if (ch === ',' && !inQ) { cols.push(cur.trim()); cur = ''; }
        else cur += ch;
      }
      cols.push(cur.trim());
      const obj = {};
      headers.forEach((h, i) => obj[h] = (cols[i] ?? '').replace(/^"|"$/g,''));
      obj.id  = +obj.id;
      obj.lat = parseFloat(obj.lat);
      obj.lon = parseFloat(obj.lon);
      return obj;
    }).filter(t => t.lat && t.lon);
    if (parsed.length > 0) {
      talleres = parsed;
      console.log('Datos cargados desde Google Sheets: ' + parsed.length + ' talleres');
    } else { throw new Error('Sheet vacío'); }
  } catch(e) {
    console.warn('Usando datos locales (fallback):', e.message);
    talleres = RAW.map(t => Object.assign({}, t));
  }
  init();renderLeg();renderFG();render();
})();
</script>
